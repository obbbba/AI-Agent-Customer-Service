<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelpBee × LangGraph — 智能客服 Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.chat{width:420px;height:640px;background:#1a1a1a;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.header{background:#1a1a1a;padding:14px 18px;border-bottom:1px solid #333;display:flex;align-items:center;gap:8px}
.header .dot{width:8px;height:8px;background:#4ade80;border-radius:50%}
.header h1{font-size:15px;font-weight:600}
.logs{background:#111;border-bottom:1px solid #333;padding:8px 16px;font-size:11px;color:#888;max-height:100px;overflow-y:auto}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5}
.msg.user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#27272a;color:#e4e4e7;border-bottom-left-radius:4px}
.msg.system{align-self:center;background:transparent;color:#888;font-size:12px;padding:4px 8px}
.input-area{padding:12px 16px;border-top:1px solid #333;display:flex;gap:8px}
.input-area input{flex:1;padding:10px 14px;background:#27272a;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;outline:none}
.input-area input:focus{border-color:#555}
.input-area button{padding:10px 16px;background:#facc15;border:none;border-radius:8px;color:#000;font-weight:600;cursor:pointer}
.input-area button:hover{background:#fbbf24}
.input-area button:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="chat">
  <div class="header">
    <div class="dot"></div>
    <h1>HelpBee × LangGraph</h1>
    <span style="font-size:11px;color:#888;margin-left:auto">v2.0</span>
  </div>
  <div class="logs" id="logs"></div>
  <div class="messages" id="messages">
    <div class="msg bot">👋 你好！我是基于 LangGraph 的智能客服。<br>可以问我外卖、退款、配送等问题。</div>
  </div>
  <div class="input-area">
    <input id="input" placeholder="输入问题..." onkeydown="event.key==='Enter'&&send()" />
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<script>
const msgs = document.getElementById('messages');
const logs = document.getElementById('logs');
const input = document.getElementById('input');
const btn = document.getElementById('sendBtn');

async function send() {
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  btn.disabled = true;
  logs.innerHTML = '';

  addMsg(q, 'user');
  addMsg('...', 'bot', 'thinking');

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: q, history: []})
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let full = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const d = JSON.parse(line.slice(6));
        if (d.type === 'agent_log') {
          logs.innerHTML += `<div>${d.content}</div>`;
          logs.scrollTop = logs.scrollHeight;
        } else if (d.type === 'delta') {
          full += d.content;
          updateThinking(full);
        } else if (d.type === 'done') {
          document.querySelector('.thinking')?.remove();
          if (d.escalate) {
            addMsg(full + '\n\n🔄 已自动转接人工客服', 'bot');
          } else {
            addMsg(full, 'bot');
          }
        }
      }
    }
  } catch(e) {
    document.querySelector('.thinking')?.remove();
    addMsg('⚠️ 请求失败: ' + e.message, 'system');
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

function addMsg(text, role, cls) {
  const div = document.createElement('div');
  div.className = `msg ${role}` + (cls ? ` ${cls}` : '');
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function updateThinking(text) {
  let div = document.querySelector('.thinking');
  if (!div) { div = document.createElement('div'); div.className = 'msg bot thinking'; msgs.appendChild(div); }
  div.textContent = text;
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
